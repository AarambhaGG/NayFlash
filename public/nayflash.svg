<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0088cc"/>
    </linearGradient>
  </defs>
  <!-- USB stick body -->
  <rect x="35" y="55" width="30" height="40" rx="3" fill="#1a1d27" stroke="#00d4ff" stroke-width="2"/>
  <rect x="40" y="48" width="20" height="10" rx="1" fill="#1a1d27" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="44" y="51" width="4" height="4" rx="0.5" fill="#00d4ff" opacity="0.6"/>
  <rect x="52" y="51" width="4" height="4" rx="0.5" fill="#00d4ff" opacity="0.6"/>
  <!-- Lightning bolt -->
  <polygon points="58,5 42,42 52,42 38,75 65,32 53,32 66,5" fill="url(#bolt)"/>
  <!-- Glow effect -->
  <polygon points="58,5 42,42 52,42 38,75 65,32 53,32 66,5" fill="url(#bolt)" opacity="0.3" filter="blur(4px)"/>
</svg>
